name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  core:
    name: Python Core
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync locked workspace
        run: uv sync --all-packages --all-extras --locked

      - name: Lint
        run: uv run --package weatherflow-core --extra dev ruff check core/src core/tests

      - name: Check formatting
        run: uv run --package weatherflow-core --extra dev ruff format --check core/src core/tests

      - name: Test
        run: uv run --package weatherflow-core --extra dev pytest core/tests -q

  desktop:
    name: Desktop Frontend and Tauri
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend gates
        run: pnpm --filter weatherflow-desktop lint && pnpm --filter weatherflow-desktop typecheck && pnpm --filter weatherflow-desktop test && pnpm --filter weatherflow-desktop build

      - name: Rust format
        working-directory: desktop/src-tauri
        run: cargo fmt --check

      - name: Rust tests and check
        working-directory: desktop/src-tauri
        run: cargo test --lib && cargo check
