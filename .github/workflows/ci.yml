name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  core:
    name: Python Core
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync locked workspace
        run: uv sync --all-packages --all-extras --locked

      - name: Lint
        run: uv run --package weatherflow-core --extra dev ruff check core/src core/tests

      - name: Check formatting
        run: uv run --package weatherflow-core --extra dev ruff format --check core/src core/tests

      - name: Test
        run: uv run --package weatherflow-core --extra dev pytest core/tests -q

  desktop:
    name: Desktop Frontend and Tauri
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Frontend gates
        working-directory: desktop
        run: npm run lint && npm run typecheck && npm test && npm run build

      - name: Rust format
        working-directory: desktop/src-tauri
        run: cargo fmt --check

      - name: Rust tests and check
        working-directory: desktop/src-tauri
        run: cargo test --lib && cargo check
