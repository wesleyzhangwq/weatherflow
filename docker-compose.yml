services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./backend/data/qdrant:/qdrant/storage

  backend:
    build: ./backend
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./backend/data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8765
    depends_on:
      - qdrant
