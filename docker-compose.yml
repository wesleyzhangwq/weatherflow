services:
  backend:
    build: ./backend
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      QDRANT_URL: http://qdrant:6333
      LANGFUSE_HOST: http://langfuse:3000
    volumes:
      - ${WF_DATA_DIR:-./.wf-data}:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8765
    depends_on:
      qdrant:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://127.0.0.1:8765
      NEXT_SERVER_API_BASE: http://backend:8765
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      - backend

  # v2: Qdrant vector database for L2.5 semantic memory
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # The qdrant image ships no curl/wget — a curl-based check stays
      # "unhealthy" forever and the backend (condition: service_healthy)
      # never starts. Probe the TCP port with bash's /dev/tcp instead.
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # v2: Langfuse observability (self-hosted)
  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-langfuse-secret-change-me}
      NEXTAUTH_URL: http://localhost:3001
      # Required by langfuse:2 (self-hosted). Values come from .env (compose
      # reads it automatically) — never hardcode secrets here. Generate with:
      #   LANGFUSE_SALT:           openssl rand -base64 32
      #   LANGFUSE_ENCRYPTION_KEY: openssl rand -hex 32
      SALT: ${LANGFUSE_SALT:?set LANGFUSE_SALT in .env}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?set LANGFUSE_ENCRYPTION_KEY in .env}
      TELEMETRY_ENABLED: "false"
    depends_on:
      langfuse-db:
        condition: service_healthy

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  frontend_node_modules:
  qdrant_data:
  langfuse_db_data:
