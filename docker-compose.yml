services:
  backend:
    build: ./backend
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      QDRANT_URL: http://qdrant:6333
      LANGFUSE_HOST: http://langfuse:3000
    volumes:
      - ${WF_DATA_DIR:-./.wf-data}:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8765
    depends_on:
      qdrant:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://127.0.0.1:8765
      NEXT_SERVER_API_BASE: http://backend:8765
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      - backend

  # v2: Qdrant vector database for L2.5 semantic memory
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # v2: Langfuse observability (self-hosted)
  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: langfuse-secret-change-me
      NEXTAUTH_URL: http://localhost:3001
    depends_on:
      - langfuse-db

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data

volumes:
  frontend_node_modules:
  qdrant_data:
  langfuse_db_data:
