<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-label="Google Cloud project and API Library setup">
  <rect width="1120" height="640" fill="#f7f9fc"/>
  <rect x="40" y="40" width="1040" height="560" rx="18" fill="#fff" stroke="#d9e2ef"/>
  <rect x="40" y="40" width="1040" height="74" rx="18" fill="#eef4ff"/>
  <text x="72" y="86" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Google Cloud Console</text>
  <rect x="70" y="142" width="250" height="76" rx="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
  <text x="92" y="176" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">1. Select project</text>
  <text x="92" y="201" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">WF calendar / your project</text>
  <path d="M320 180 L430 180" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="430" y="142" width="280" height="76" rx="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
  <text x="452" y="176" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">2. Open API Library</text>
  <text x="452" y="201" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">APIs &amp; Services -> Library</text>
  <path d="M710 180 L820 180" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="820" y="142" width="230" height="76" rx="8" fill="#fff" stroke="#16a34a" stroke-width="3"/>
  <text x="842" y="176" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">3. Enable API</text>
  <text x="842" y="201" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">Google Calendar API</text>
  <rect x="95" y="280" width="930" height="238" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="126" y="322" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Search result card</text>
  <rect x="126" y="352" width="120" height="92" rx="10" fill="#dbeafe"/>
  <text x="166" y="407" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#2563eb">31</text>
  <text x="274" y="382" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">Google Calendar API</text>
  <text x="274" y="418" font-family="Arial, sans-serif" font-size="18" fill="#475569">Manage calendars and events in Google Calendar.</text>
  <rect x="770" y="372" width="150" height="50" rx="8" fill="#2563eb"/>
  <text x="810" y="404" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Enable</text>
  <text x="126" y="560" font-family="Arial, sans-serif" font-size="16" fill="#64748b">If it already says "API enabled", you can skip the Enable click.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
