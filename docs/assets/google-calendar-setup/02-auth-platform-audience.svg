  <rect x="40" y="40" width="1040" height="560" rx="18" fill="#fff" stroke="#d9e2ef"/>
  <rect x="40" y="40" width="240" height="560" rx="18" fill="#f1f5f9"/>
  <text x="70" y="92" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Google Auth Platform</text>
