<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-label="Create OAuth Desktop client">
  <rect width="1120" height="640" fill="#f7f9fc"/>
  <rect x="40" y="40" width="1040" height="560" rx="18" fill="#fff" stroke="#d9e2ef"/>
  <text x="86" y="96" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">Create OAuth client ID</text>
  <rect x="86" y="150" width="650" height="74" rx="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
  <text x="108" y="178" font-family="Arial, sans-serif" font-size="15" fill="#64748b">Application type</text>
  <text x="108" y="205" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Desktop app</text>
  <rect x="86" y="260" width="650" height="74" rx="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
  <text x="108" y="288" font-family="Arial, sans-serif" font-size="15" fill="#64748b">Name</text>
  <text x="108" y="315" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">WeatherFlow Local Desktop</text>
  <rect x="86" y="390" width="120" height="50" rx="8" fill="#2563eb"/>
  <text x="118" y="422" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Create</text>
  <path d="M220 415 L340 415" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="340" y="372" width="520" height="86" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/>
  <text x="365" y="408" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#14532d">OAuth client created</text>
  <text x="365" y="436" font-family="Arial, sans-serif" font-size="16" fill="#166534">Click Download JSON, or open the client detail page later.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>
</svg>
