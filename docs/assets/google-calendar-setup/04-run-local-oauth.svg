<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-label="Run WeatherFlow local OAuth command">
  <rect width="1120" height="640" fill="#0f172a"/>
  <rect x="56" y="56" width="1008" height="528" rx="18" fill="#111827" stroke="#334155"/>
  <circle cx="92" cy="88" r="9" fill="#ef4444"/>
  <circle cx="122" cy="88" r="9" fill="#f59e0b"/>
  <circle cx="152" cy="88" r="9" fill="#22c55e"/>
  <text x="84" y="146" font-family="Menlo, Consolas, monospace" font-size="22" fill="#e5e7eb">$ uv run wf setup-calendar --credentials ./client_secret.json</text>
  <text x="84" y="198" font-family="Menlo, Consolas, monospace" font-size="18" fill="#93c5fd">Please visit this URL to authorize this application:</text>
  <rect x="84" y="222" width="880" height="54" rx="8" fill="#1e293b" stroke="#3b82f6"/>
  <text x="104" y="256" font-family="Menlo, Consolas, monospace" font-size="16" fill="#bfdbfe">https://accounts.google.com/o/oauth2/auth?...</text>
  <path d="M524 292 L524 366" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="284" y="382" width="552" height="116" rx="12" fill="#ecfeff" stroke="#38bdf8"/>
  <text x="318" y="424" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Browser consent opens</text>
  <text x="318" y="456" font-family="Arial, sans-serif" font-size="17" fill="#334155">Choose your Google account and allow Calendar read-only access.</text>
  <text x="84" y="546" font-family="Menlo, Consolas, monospace" font-size="18" fill="#86efac">Google Calendar authorization complete. Token saved to: .../google_calendar_token.json</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
</svg>
