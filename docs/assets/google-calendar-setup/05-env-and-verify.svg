<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-label="Configure env and verify providers">
  <rect width="1120" height="640" fill="#f7f9fc"/>
  <rect x="50" y="54" width="500" height="510" rx="16" fill="#111827"/>
  <text x="86" y="105" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#f9fafb">.env</text>
  <text x="86" y="156" font-family="Menlo, Consolas, monospace" font-size="16" fill="#93c5fd">GOOGLE_CALENDAR_TOKEN_FILE=</text>
  <text x="86" y="184" font-family="Menlo, Consolas, monospace" font-size="16" fill="#e5e7eb">/Users/you/.local/share/weatherflow/data/</text>
  <text x="86" y="212" font-family="Menlo, Consolas, monospace" font-size="16" fill="#e5e7eb">google_calendar_token.json</text>
  <text x="86" y="260" font-family="Menlo, Consolas, monospace" font-size="16" fill="#93c5fd">GOOGLE_CALENDAR_CALENDAR_ID=primary</text>
  <text x="86" y="308" font-family="Menlo, Consolas, monospace" font-size="16" fill="#93c5fd">GOOGLE_CALENDAR_BASE_URL=</text>
  <text x="86" y="336" font-family="Menlo, Consolas, monospace" font-size="16" fill="#e5e7eb">https://www.googleapis.com/calendar/v3</text>
  <rect x="610" y="54" width="460" height="510" rx="16" fill="#fff" stroke="#d9e2ef"/>
  <text x="646" y="105" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Verify</text>
  <rect x="646" y="140" width="360" height="52" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="666" y="172" font-family="Menlo, Consolas, monospace" font-size="14" fill="#111827">make dev-backend</text>
  <rect x="646" y="218" width="360" height="52" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="666" y="250" font-family="Menlo, Consolas, monospace" font-size="14" fill="#111827">curl /api/dev-review/providers</text>
  <rect x="646" y="310" width="360" height="120" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/>
  <text x="676" y="354" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#14532d">google_calendar</text>
  <text x="676" y="392" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#16a34a">ready</text>
  <text x="646" y="500" font-family="Arial, sans-serif" font-size="16" fill="#64748b">If status is needs_config, re-check token path and restart backend.</text>
</svg>
